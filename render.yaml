# CrimeJournal Backend Deployment Configuration
# Render - Free Tier
#
# Deploy: Push to GitHub with Render Blueprints enabled, or connect manually
# Note: Free tier sleeps after 15 minutes of inactivity
#       Cold start takes ~30 seconds on first request
#
# Docs: https://render.com/docs/deploy?create&lang=python

services:
  - type: web
    name: crimejournal-api
    runtime: python
    region: oregon
    plan: free

    # Python runtime version
    pythonVersion: "3.11"

    # Build: install dependencies from backend/requirements.txt
    buildCommand: |
      cd backend && pip install -r requirements.txt

    # Start: uvicorn serves the FastAPI app
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Health check endpoint (GET /health)
    healthCheckPath: /health

    # Environment variables
    envVars:
      # Python
      - key: PYTHON_VERSION
        value: "3.11"

      # Application
      - key: APP_NAME
        value: CrimeJournal
      - key: APP_VERSION
        value: "1.0.0"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

      # MiniMax AI API (set via Render dashboard - do NOT commit real keys)
      # Get your key at: https://platform.minimax.chat/
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_BASE_URL
        value: https://api.minimax.chat/v1
      - key: MINIMAX_MODEL
        value: MiniMax-M2.7-highspeed

      # CourtListener API (free legal data)
      # Get your token at: https://www.courtlistener.com/api/token/
      - key: COURTLISTENER_API_TOKEN
        sync: false

      # Database
      # Development: SQLite (default - file stored in container)
      # Production: Set DATABASE_URL via Render dashboard to your Supabase/postgres URL
      - key: DATABASE_URL
        value: sqlite:///./crimejournal.db

      # JWT Authentication
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "24"

      # Local Embedding Model (free, no API needed)
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

      # Redis Cache (optional - for production use paid tier or Upstash)
      # Free tier: Redis is not available, set empty to disable caching
      - key: REDIS_URL
        value: ""

      # Logging
      - key: LOG_LEVEL
        value: INFO
