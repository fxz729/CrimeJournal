# Render Backend Deployment Configuration
# https://render.com/docs/deploy?create&lang=python

# Free tier configuration
# Note: Free tier has sleep after 15 min of inactivity
# For production, consider paid tiers

services:
  - type: web
    name: crimejournal-api
    runtime: python
    region: oregon
    plan: free

    # Build command
    buildCommand: |
      cd backend
      pip install -r requirements.txt

    # Start command
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Health check
    healthCheckPath: /health

    # Environment variables
    envVars:
      # Application
      - key: APP_NAME
        value: CrimeJournal
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "false"

      # DeepSeek API (set via Render dashboard for production)
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1

      # CourtListener API (set via Render dashboard)
      - key: COURTLISTENER_API_TOKEN
        sync: false

      # Database - PostgreSQL (create via Render dashboard)
      - key: DATABASE_URL
        sync: false

      # JWT
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "24"

      # Embedding Model
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # Redis Cache Service
  - type: redis
    name: crimejournal-redis
    plan: free
    region: oregon
    ipAllowList: []
